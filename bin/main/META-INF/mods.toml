[[mods]]
modId="maw_sample_addon"
version="1.0.0"
displayName="MAW Sample Addon"
description='''
The four primitives and Weapons のサンプルアドオンです。
このファイルを参考にアドオンを作成してください。
'''
authors="YourName"

# ===== 依存関係 =====

# Minecraft 本体
[[dependencies.maw_sample_addon]]
    modId="minecraft"
    mandatory=true
    versionRange="[${mc_version}]"
    ordering="NONE"
    side="BOTH"

# Forge
[[dependencies.maw_sample_addon]]
    modId="forge"
    mandatory=true
    versionRange="[47,)"
    ordering="NONE"
    side="BOTH"

# 本体: The four primitives and Weapons（必須依存）
# BEFOREにするとアドオンが本体より後にロードされる（推奨）
[[dependencies.maw_sample_addon]]
    modId="minecraft_armor_weapon"
    mandatory=true
    versionRange="[1.0.0,)"
    ordering="AFTER"
    side="BOTH"

# Farmer's Delight（オプション依存 — なくても動作する）
[[dependencies.maw_sample_addon]]
    modId="farmersdelight"
    mandatory=false
    versionRange="[1.0.0,)"
    ordering="AFTER"
    side="BOTH"
